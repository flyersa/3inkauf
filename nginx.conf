server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache the service worker or its registration shim — must revalidate every load
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        expires off;
        try_files $uri =404;
    }
    # Never cache index.html so the browser always sees the latest bundle hashes
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # Digital Asset Links — required by Play Store TWA verification.
    # Must return 200 with application/json Content-Type, no redirects.
    location = /.well-known/assetlinks.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
        try_files /.well-known/assetlinks.json =404;
    }

    # Privacy policy — linked from Play Store listing.
    location = /privacy {
        default_type text/html;
        add_header Cache-Control "public, max-age=3600";
        try_files /privacy.html =404;
    }
    location = /privacy.html {
        default_type text/html;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA fallback (hashed bundles under /assets/ can keep default long cache)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
